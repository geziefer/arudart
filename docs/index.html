<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AruDart video</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      padding: 0.5rem;
      box-sizing: border-box;
    }

    video {
      width: auto;
      max-width: 100%;
      max-height: calc(100dvh - 1rem);
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <video controls playsinline>
    <source src="./arudart.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</body>
</html>
