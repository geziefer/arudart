<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AruDart video</title>
  <style>
    html, body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }

    body {
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: grid;
      place-items: center;
    }

    .video-wrap {
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111;
    }

    video {
      max-width: 100vw;
      max-height: 100dvh;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video controls playsinline>
      <source src="./arudart.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
