[camera_detection]
auto_detect = true
num_cameras = 3
min_width = 800
min_height = 600
exclude_builtin = true
max_index = 10

# Camera position mapping (clockwise from top):
# cam0 = upper right (near 18, ~1 o'clock)
# cam1 = lower right (near 17, ~5 o'clock) - was single-camera test position
# cam2 = left (near 11, ~9 o'clock)
#
# IMPORTANT: Camera indices depend on USB port enumeration order.
# To maintain consistent cam0/cam1/cam2 mapping, always plug cameras into the SAME USB ports:
# - USB port A → cam0 (upper right/18)
# - USB port B → cam1 (lower right/17)
# - USB port C → cam2 (left/11)

[camera_settings]
width = 800
height = 600
fps = 25
fourcc = "MJPG"

# Platform-specific camera control (v4l2-ctl on Linux, uvc-util on macOS)
# Automatically detects platform and uses appropriate tool
[camera_control]
enabled = true
# Fixed settings for all cameras:
# - auto_exposure = false (manual mode)
# - brightness = -64 (darkest)
# Per-camera tunable settings:
# - exposure_time_ms: Fixed exposure time in milliseconds (e.g. 3.7ms = 3700µs)
# - contrast: Image contrast (typically 10-50)
# - gamma: Gamma correction (typically 100-400)
[camera_control.per_camera]
cam0 = { exposure_time_ms = 4.3, contrast = 30, gamma = 250 }
cam1 = { exposure_time_ms = 3.6, contrast = 30, gamma = 200 }
cam2 = { exposure_time_ms = 4.9, contrast = 30, gamma = 380 }

[motion_detection]
downscale_factor = 4
motion_threshold = 15
blur_kernel = 21
settled_threshold = 1.0  # Lower - dart causes ~1.5-2% change
motion_check_interval = 0.05  # Faster checks (20 FPS) to catch brief motion
settled_time = 0.5  # Wait 0.5s after motion stops before detecting dart

[dart_detection]
diff_threshold = 25  # Raised from 15 - reduces sensor noise that causes false detections
blur_kernel = 3  # Smaller blur to preserve dart details
min_dart_area = 50  # Lower minimum (dart might be small)
max_dart_area = 10000  # Increased - dart with flight can be large
min_shaft_length = 15  # Lower minimum length
aspect_ratio_min = 1.0  # Lowered from 1.2 - darts at angles appear shorter/wider

# Calibration configuration for spiderweb-based coordinate mapping
[calibration]
calibration_dir = "calibration"
drift_threshold_mm = 3.0  # Trigger recalibration if drift exceeds this
max_calibration_failures = 3  # Enter error state after this many consecutive failures

# Feature detection parameters for color-based calibration
[calibration.feature_detection]
bull_min_radius_px = 10  # Minimum bull radius in pixels
bull_max_radius_px = 30  # Maximum bull radius in pixels
canny_threshold_low = 50  # Canny edge detection low threshold
canny_threshold_high = 150  # Canny edge detection high threshold

# HSV color ranges for dartboard (Winmau Blade 6 under LED lighting)
# Black singles: low saturation, low value
black_singles_h_min = 0
black_singles_h_max = 180
black_singles_s_min = 0
black_singles_s_max = 50
black_singles_v_min = 0
black_singles_v_max = 80

# White/cream singles: low saturation, high value
white_singles_h_min = 0
white_singles_h_max = 180
white_singles_s_min = 0
white_singles_s_max = 50
white_singles_v_min = 150
white_singles_v_max = 255

# Red rings (double bull, red segments): hue ~0° or ~170-180°
red_ring_h_min_1 = 0
red_ring_h_max_1 = 10
red_ring_h_min_2 = 170
red_ring_h_max_2 = 180
red_ring_s_min = 100
red_ring_s_max = 255
red_ring_v_min = 100
red_ring_v_max = 255

# Green rings (single bull, green segments): hue ~40-80°
green_ring_h_min = 40
green_ring_h_max = 80
green_ring_s_min = 100
green_ring_s_max = 255
green_ring_v_min = 100
green_ring_v_max = 255

# Color transition detection
min_boundary_edge_points = 10
boundary_clustering_angle_deg = 2.0

# Homography computation parameters
[calibration.homography]
ransac_threshold_px = 5.0  # RANSAC reprojection threshold in pixels
ransac_confidence = 0.999  # RANSAC confidence level
max_reprojection_error_mm = 5.0  # Maximum acceptable reprojection error in mm

# Chessboard intrinsic calibration parameters
[calibration.chessboard]
inner_corners = [9, 6]  # Chessboard inner corners (width, height)
square_size_mm = 25.0  # Chessboard square size in millimeters

# Multi-camera fusion configuration
[fusion]
outlier_threshold_mm = 25.0       # tightened from 50.0
pairwise_rejection_mm = 20.0      # new — for 2-camera case
min_confidence = 0.3              # unchanged
angular_falloff = 1.0             # new — cosine exponent
[fusion.camera_anchors]
cam0 = 81
cam1 = 257
cam2 = 153

# Dartboard dimensions (Winmau Blade 6 specifications)
[board]
radius_mm = 170.0
bull_radius_mm = 6.35
single_bull_radius_mm = 15.9
triple_inner_mm = 99.0
triple_outer_mm = 107.0
double_inner_mm = 162.0
double_outer_mm = 170.0

# Sector configuration
[board.sectors]
sector_order = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5]
sector_width_deg = 18.0
wire_gap_deg = 2.0
sector_offset_deg = 0.0

# State machine configuration
[state_machine]
settled_timeout_ms = 500          # Wait for motion to settle
throw_timeout_ms = 2000           # Max time to detect dart after motion
pull_out_timeout_ms = 5000        # Max time for pull-out

# Motion classification (dart vs hand)
[motion_classification]
dart_speed_threshold_px_per_s = 500
hand_speed_threshold_px_per_s = 200
dart_size_threshold_px2 = 100
hand_size_threshold_px2 = 500
dart_duration_threshold_ms = 200
hand_duration_threshold_ms = 500

# Bounce-out detection
[bounce_out_detection]
check_interval_ms = 1000
